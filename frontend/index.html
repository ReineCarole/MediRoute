<!doctype html>
<html>
  <head>
    <title>MediRoute Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
      body {
        margin: 0;
      }

      #map {
        height: 100vh;
      }

      /* UI Panel */
      #panel {
        position: absolute;
        top: 20px;
        left: 20px;
        background: white;
        padding: 15px;
        border-radius: 10px;
        z-index: 1000;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        font-family: Arial;
      }
    </style>
  </head>

  <body>
    <div id="panel">
      <h3>🚑 MediRoute</h3>
      <p id="status">Status: Idle</p>
      <p id="eta">ETA: --</p>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
      // Initialize map
      var map = L.map("map").setView([4.05, 9.7], 12);

      // Tiles
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap",
      }).addTo(map);

      // Locations
      const coords = {
        "Akwa Depot": [4.0511, 9.7679],
        Deido: [4.06, 9.72],
        Bonassama: [4.05, 9.68],
      };

      let currentLine = null;
      let blockedLines = [];
      let vehicle = null;

      // Truck icon
      const truckIcon = L.icon({
        iconUrl: "https://cdn-icons-png.flaticon.com/512/743/743922.png",
        iconSize: [40, 40],
      });

      // Interpolation
      function interpolatePoints(start, end, steps = 40) {
        let points = [];
        for (let i = 0; i <= steps; i++) {
          let lat = start[0] + (end[0] - start[0]) * (i / steps);
          let lng = start[1] + (end[1] - start[1]) * (i / steps);
          points.push([lat, lng]);
        }
        return points;
      }

      function buildSmoothPath(path) {
        let smooth = [];
        for (let i = 0; i < path.length - 1; i++) {
          smooth = smooth.concat(interpolatePoints(path[i], path[i + 1]));
        }
        return smooth;
      }

      // 🚚 Animation
      function animateDelivery(path) {
        let smoothPath = buildSmoothPath(path);
        let index = 0;

        if (vehicle) {
          map.removeLayer(vehicle);
        }

        vehicle = L.marker(smoothPath[0], { icon: truckIcon })
          .addTo(map)
          .bindPopup("🚚 Delivery")
          .openPopup();

        // ETA
        let eta = Math.floor(smoothPath.length * 0.05);
        document.getElementById("eta").innerText = "ETA: " + eta + "s";

        function move() {
          if (index < smoothPath.length) {
            vehicle.setLatLng(smoothPath[index]);
            index++;
            setTimeout(move, 100);
          } else {
            document.getElementById("status").innerText =
              "Status: Delivered ✅";
          }
        }

        move();
      }

      // Route
      async function drawRoute(destination) {
        try {
          const res = await fetch(`http://127.0.0.1:8000/route/${destination}`);
          const data = await res.json();

          if (data.error) {
            alert("No route found");
            return;
          }

          let path = data.path
            .map((loc) => coords[loc])
            .filter((p) => p !== undefined);

          // remove old
          if (currentLine) {
            map.removeLayer(currentLine);
          }

          currentLine = L.polyline(path, { weight: 5 }).addTo(map);

          // update UI
          document.getElementById("status").innerText =
            "Status: Delivering to " + destination;

          // zoom
          map.setView(coords[destination], 13);

          // animate
          animateDelivery(path);
        } catch (err) {
          console.error(err);
        }
      }

      // Blocked roads
      async function drawBlockedRoads() {
        try {
          const res = await fetch("http://127.0.0.1:8000/roads/blocked");
          const data = await res.json();

          blockedLines.forEach((l) => map.removeLayer(l));
          blockedLines = [];

          data.blocked.forEach(([from, to]) => {
            let f = from.trim();
            let t = to.trim();

            if (coords[f] && coords[t]) {
              let line = L.polyline([coords[f], coords[t]], {
                color: "red",
                weight: 5,
              }).addTo(map);

              blockedLines.push(line);
            }
          });
        } catch (err) {
          console.error(err);
        }
      }

      // Markers
      L.marker(coords["Akwa Depot"]).addTo(map).bindPopup("Akwa Depot");

      L.marker(coords["Deido"])
        .addTo(map)
        .bindPopup("Deido")
        .on("click", () => drawRoute("Deido"));

      L.marker(coords["Bonassama"])
        .addTo(map)
        .bindPopup("Bonassama")
        .on("click", () => drawRoute("Bonassama"));

      // Init
      drawBlockedRoads();
      setInterval(drawBlockedRoads, 3000);
    </script>
  </body>
</html>
